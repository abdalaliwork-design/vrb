server {
    listen 80;
    root /usr/share/nginx/html;

    # ── Discord Activity proxy rewrite ────────────────────────────────────────
    # Discord proxies Activity requests through /.proxy/ on the same origin.
    # We forward those to the backend service on Railway's internal network.
    # BACKEND_INTERNAL_URL is set as an env var in Railway:
    #   e.g. http://backend.railway.internal:3001
    location /.proxy/ {
        proxy_pass $BACKEND_INTERNAL_URL/;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # MJPEG streams can be long-lived — disable buffering
        proxy_buffering off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri /index.html;
    }

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
